<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>⚾ 今夜決勝局：晚餐爭霸賽</title>

<!-- 使用 Google Fonts：Baloo 2（標題）、Nunito（內文）、Space Mono（計分板數字） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   0. 設計代幣（Design Tokens）－ 夜間球場配色系統
   ============================================================ */
:root{
  --navy-deep:   #0B132B; /* 夜空背景 */
  --navy-mid:    #161F3D; /* 面板底色 */
  --navy-panel:  #1E2A4A; /* 卡片底色 */
  --grass:       #2D6A4F; /* 草皮 */
  --grass-light: #3E8E6B; /* 草皮亮部 */
  --clay:        #C97B4A; /* 內野土色 */
  --clay-dark:   #9C5A32; /* 土色暗部 */
  --cream:       #F4F1DE; /* 粉筆白／主文字 */
  --cream-dim:   #C9C6B4; /* 次要文字 */
  --amber:       #FFB627; /* 計分板強調色／CTA */
  --amber-dark:  #E09A0F;
  --foul-red:    #E63946; /* 警示／三振 */
  --sky-glow:    #FFD9A0; /* 燈光暈染 */

  --font-display:'Baloo 2', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
  --font-body:   'Nunito', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
  --font-mono:   'Space Mono', 'Courier New', monospace;

  --radius-lg: 26px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --shadow-soft: 0 14px 34px rgba(0,0,0,.45);
  --shadow-pop:  0 6px 0 rgba(0,0,0,.25);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, #24325c 0%, transparent 55%),
    radial-gradient(ellipse 100% 60% at 50% 110%, #0d1730 0%, transparent 60%),
    var(--navy-deep);
  color:var(--cream);
  font-family:var(--font-body);
  overflow-x:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 12px;
}

/* 尊重使用者的減少動態偏好設定 */
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}

/* ============================================================
   1. 背景裝飾：夜空星光 / 球場探照燈光點
   ============================================================ */
#stars-bg{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,.55), transparent),
    radial-gradient(2px 2px at 80% 15%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 60% 35%, rgba(255,255,255,.5), transparent),
    radial-gradient(1.5px 1.5px at 30% 60%, rgba(255,255,255,.35), transparent),
    radial-gradient(2px 2px at 90% 70%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 45% 85%, rgba(255,255,255,.3), transparent);
  animation:twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle{ from{opacity:.5;} to{opacity:1;} }

/* ============================================================
   2. 「街機主機」外框 － 整個遊戲的招牌視覺元素
   一圈追逐跑動的跑馬燈燈泡，呼應棒球場記分板 + 復古街機機台
   ============================================================ */
.cabinet{
  position:relative; z-index:1;
  width:min(94vw, 460px);
  background:linear-gradient(180deg, #101a35, #0c1428);
  border-radius:32px;
  padding:16px;
  box-shadow: var(--shadow-soft), inset 0 0 0 2px rgba(255,255,255,.03);
}
.cabinet::before{
  /* 跑馬燈：一整圈間隔均勻的小燈泡，透過 background chase 動畫輪流亮起 */
  content:'';
  position:absolute; inset:5px;
  border-radius:28px;
  padding:1px;
  pointer-events:none;
  background-image:
    repeating-linear-gradient(90deg, var(--amber) 0 6px, transparent 6px 20px);
  background-size:20px 3px, 3px 20px, 20px 3px, 3px 20px;
  background-position:0 0, 100% 0, 100% 100%, 0 100%;
  background-repeat:repeat-x, repeat-y, repeat-x, repeat-y;
  background-clip:content-box;
  -webkit-mask:
    linear-gradient(#000,#000) content-box,
    linear-gradient(#000,#000);
  opacity:.85;
  animation:marquee-chase 1.1s linear infinite;
}
@keyframes marquee-chase{
  0%{ filter:brightness(1); }
  50%{ filter:brightness(1.7) saturate(1.3); }
  100%{ filter:brightness(1); }
}
.cabinet-screen{
  position:relative;
  background:var(--navy-mid);
  border-radius:22px;
  padding:16px 14px 18px;
  min-height:560px;
  overflow:hidden;
  box-shadow:inset 0 2px 18px rgba(0,0,0,.5);
}

/* ============================================================
   3. 畫面切換共用樣式
   ============================================================ */
.screen{ position:relative; z-index:1; }
.hidden{ display:none !important; }
.fade-in{ animation:fadeIn .5s ease both; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

h1,h2,h3{ font-family:var(--font-display); margin:0; }

/* ============================================================
   4. 標題畫面
   ============================================================ */
#screen-title{ text-align:center; padding:10px 4px 4px; }
.floodlight-row{ display:flex; justify-content:center; gap:14px; margin-bottom:6px; }
.floodlight{
  width:14px; height:14px; border-radius:50%;
  background:#3a4568;
  box-shadow:0 0 0 3px rgba(255,255,255,.03);
  animation:floodlight-on 2.4s ease-in-out infinite;
}
.floodlight:nth-child(2){ animation-delay:.2s; }
.floodlight:nth-child(3){ animation-delay:.4s; }
.floodlight:nth-child(4){ animation-delay:.6s; }
.floodlight:nth-child(5){ animation-delay:.8s; }
@keyframes floodlight-on{
  0%,100%{ background:#3a4568; box-shadow:0 0 0 3px rgba(255,255,255,.03); }
  50%{ background:var(--sky-glow); box-shadow:0 0 18px 6px rgba(255,217,160,.8); }
}

.title-ball{
  width:64px; height:64px; margin:6px auto 2px;
  border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #ffffff, #f0ede1 55%, #d8d4c3 100%);
  position:relative;
  box-shadow:0 8px 0 rgba(0,0,0,.25), 0 10px 16px rgba(0,0,0,.35);
  animation:ball-roll-in 1.1s cubic-bezier(.2,.9,.3,1.2) both;
}
.title-ball::before,.title-ball::after{
  content:''; position:absolute; width:46px; height:46px; top:9px; left:9px;
  border:2px solid var(--foul-red); border-radius:50%;
  clip-path:polygon(0 40%,100% 40%,100% 60%,0 60%);
  opacity:.75;
}
.title-ball::before{ transform:rotate(20deg); }
.title-ball::after{ transform:rotate(-20deg); }
@keyframes ball-roll-in{
  0%{ transform:translateX(-140px) rotate(-180deg) scale(.6); opacity:0; }
  70%{ opacity:1; }
  100%{ transform:translateX(0) rotate(360deg) scale(1); opacity:1; }
}

.title-heading{
  font-size:clamp(26px,7vw,34px);
  font-weight:800;
  color:var(--amber);
  text-shadow:0 3px 0 rgba(0,0,0,.35);
  letter-spacing:.5px;
  margin-top:6px;
  animation:title-bounce-in .6s .5s cubic-bezier(.3,1.6,.5,1) both;
}
.title-sub{
  font-family:var(--font-body); font-weight:700; color:var(--cream-dim);
  font-size:clamp(13px,3.4vw,15px); margin-top:6px;
  animation:fadeIn .6s .9s both;
}
@keyframes title-bounce-in{
  0%{ transform:scale(.4) translateY(20px); opacity:0; }
  100%{ transform:scale(1) translateY(0); opacity:1; }
}

.title-desc-card{
  margin:18px auto 0; max-width:340px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius-md);
  padding:14px 16px;
  font-size:13.5px; line-height:1.7; color:var(--cream-dim);
  text-align:left;
  animation:fadeIn .6s 1.1s both;
}
.title-desc-card b{ color:var(--amber); }

.btn{
  font-family:var(--font-display); font-weight:700; font-size:16px;
  border:none; cursor:pointer; color:var(--navy-deep);
  background:linear-gradient(180deg, #ffd166, var(--amber));
  padding:14px 34px; border-radius:999px;
  box-shadow:var(--shadow-pop);
  transition:transform .12s ease, box-shadow .12s ease;
  touch-action:manipulation;
}
.btn:active{ transform:translateY(6px); box-shadow:0 0 0 rgba(0,0,0,.25); }
.btn-play{
  margin-top:22px; font-size:19px; padding:16px 44px;
  animation:pulse-glow 1.8s ease-in-out infinite, fadeIn .6s 1.3s both;
}
@keyframes pulse-glow{
  0%,100%{ box-shadow:var(--shadow-pop), 0 0 0 0 rgba(255,182,39,.5); }
  50%{ box-shadow:var(--shadow-pop), 0 0 16px 4px rgba(255,182,39,.55); }
}
.btn-secondary{
  background:transparent; color:var(--cream-dim);
  border:1px solid rgba(255,255,255,.18); box-shadow:none;
  font-size:13px; padding:9px 18px; margin-top:12px;
}
.btn-secondary:active{ transform:translateY(2px); }

/* ============================================================
   5. 遊戲主畫面 － HUD 計分板
   ============================================================ */
#screen-game{ display:flex; flex-direction:column; gap:10px; }

.hud{
  display:flex; align-items:stretch; gap:8px;
  background:#0c1428; border-radius:var(--radius-md);
  padding:10px 12px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
}
.hud-block{ flex:1; text-align:center; }
.hud-label{ font-size:10px; letter-spacing:1px; color:var(--cream-dim); font-weight:700; }
.hud-value{
  font-family:var(--font-mono); font-weight:700; font-size:20px; color:var(--amber);
  font-variant-numeric:tabular-nums;
}
.hud-divider{ width:1px; background:rgba(255,255,255,.08); }
.hud-combo{ color:var(--foul-red); transition:transform .15s ease; }
.hud-combo.pop{ animation:combo-pop .35s ease; }
@keyframes combo-pop{ 0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);} }

.inning-dots{ display:flex; justify-content:center; gap:5px; }
.inning-dot{
  width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.15);
  transition:background .2s ease, transform .2s ease;
}
.inning-dot.done{ background:var(--grass-light); }
.inning-dot.current{ background:var(--amber); transform:scale(1.35); }

/* ============================================================
   6. 球場視覺區
   ============================================================ */
.field-panel{
  position:relative; height:190px; border-radius:var(--radius-md);
  overflow:hidden;
  background:
    radial-gradient(120% 90% at 12% 15%, var(--clay) 0%, var(--clay) 14%, transparent 15%),
    radial-gradient(160% 140% at 85% 90%, var(--clay) 0%, var(--clay) 20%, transparent 21%),
    linear-gradient(180deg, var(--grass-light) 0%, var(--grass) 70%);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), inset 0 10px 24px rgba(0,0,0,.25);
}
.field-panel::before{ /* 草皮條紋 */
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(100deg, rgba(255,255,255,.05) 0 22px, transparent 22px 44px);
  pointer-events:none;
}

/* 全壘打牆：球飛越此牆並消失在畫面上方 = 全壘打的明確視覺參照 */
.outfield-wall{
  position:absolute; top:0; left:0; right:0; height:13px; z-index:2;
  background:repeating-linear-gradient(90deg, var(--clay-dark) 0 10px, var(--amber-dark) 10px 20px);
  box-shadow:0 3px 8px rgba(0,0,0,.4);
  display:flex; justify-content:space-around; align-items:flex-start;
}
.wall-flag{ font-size:10px; transform:translateY(-8px); animation:flag-wave 1.6s ease-in-out infinite; }
.wall-flag:nth-child(2){ animation-delay:.25s; }
.wall-flag:nth-child(3){ animation-delay:.5s; }
.wall-flag:nth-child(4){ animation-delay:.75s; }
@keyframes flag-wave{ 0%,100%{ transform:translateY(-8px) rotate(0deg);} 50%{ transform:translateY(-8px) rotate(10deg);} }

.field-track{ position:absolute; left:0; right:0; top:50%; height:2px; transform:translateY(-1px); background:rgba(255,255,255,.18); }

.zone-band{
  position:absolute; top:50%; transform:translateY(-50%);
  height:64px; border-radius:10px; pointer-events:none;
  transition:left .35s ease, width .35s ease, background .35s ease;
}
.zone-good{ background:rgba(244,241,222,.14); border:1.5px dashed rgba(244,241,222,.4); }
.zone-great{ background:rgba(255,182,39,.22); border:1.5px solid rgba(255,182,39,.55); }
.zone-perfect{ background:rgba(255,182,39,.55); border:1.5px solid #fff3d0; box-shadow:0 0 14px rgba(255,182,39,.7); animation:zone-pulse 1s ease-in-out infinite; }
@keyframes zone-pulse{ 0%,100%{opacity:.85;} 50%{opacity:1;} }

.char{ position:absolute; top:50%; transform:translate(-50%,-50%); text-align:center; }
.pitcher-char{ left:8%; }
.batter-char{ left:87%; }
.char-body{
  width:34px; height:34px; border-radius:50% 50% 46% 46%;
  background:var(--cream); position:relative;
  box-shadow:0 4px 0 rgba(0,0,0,.2);
}
.char-cap{
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  width:26px; height:14px; background:var(--foul-red); border-radius:14px 14px 0 0;
}
.char-bat{
  position:absolute; width:24px; height:4px; background:var(--clay-dark); border-radius:3px;
  right:-20px; top:8px; transform-origin:left center; transform:rotate(35deg);
  transition:transform .12s ease;
}
.batter-char.swinging .char-bat{ animation:bat-swing .28s ease; }
@keyframes bat-swing{
  0%{ transform:rotate(35deg); }
  45%{ transform:rotate(-95deg); }
  100%{ transform:rotate(35deg); }
}
.pitcher-char.winding .char-body{ animation:pitcher-wind .5s ease; }
@keyframes pitcher-wind{
  0%,100%{ transform:rotate(0deg); }
  50%{ transform:rotate(-14deg) translateY(-3px); }
}

.ball{
  position:absolute; top:50%; left:6%; width:16px; height:16px; border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 32% 28%, #ffffff, #efece0 60%, #d6d2c1 100%);
  box-shadow:0 2px 5px rgba(0,0,0,.35);
  z-index:3;
}
.ball::before,.ball::after{
  content:''; position:absolute; inset:2px; border:1.4px solid var(--foul-red);
  border-radius:50%; clip-path:polygon(0 42%,100% 42%,100% 58%,0 58%); opacity:.7;
}
.ball::before{ transform:rotate(25deg); }
.ball::after{ transform:rotate(-25deg); }
/* 球體飛行軌跡改由 JS（Web Animations API）依當次結果隨機產生，
   這樣每一次安打／全壘打的方向、弧度、落點都不會重複，
   全壘打會清楚飛越上方的全壘打牆並消失，觀眾能立刻看懂結果的等級。 */
.ball.wobble{ animation:ball-wobble 1s ease-in-out infinite; }
.ball.trail{ box-shadow:0 0 10px 3px rgba(255,182,39,.7), 0 2px 5px rgba(0,0,0,.35); }
.sparkle-particle{
  position:absolute; width:6px; height:6px; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, #fff, var(--amber) 70%); z-index:4;
  animation:sparkle-fade .5s ease-out forwards;
}
@keyframes sparkle-fade{ to{ opacity:0; transform:translate(-50%,-50%) scale(.3); } }
@keyframes ball-wobble{ 0%,100%{ margin-top:-6px; } 50%{ margin-top:6px; } }

.dust-puff{
  position:absolute; width:20px; height:20px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.6), transparent 70%);
  transform:translate(-50%,-50%); pointer-events:none;
  animation:dust-out .5s ease-out forwards;
}
@keyframes dust-out{ from{ opacity:.9; transform:translate(-50%,-50%) scale(.3);} to{ opacity:0; transform:translate(-50%,-50%) scale(2.4);} }

/* 揮棒按鈕 */
.swing-wrap{ display:flex; justify-content:center; }
.btn-swing{
  font-family:var(--font-display); font-weight:800; font-size:20px; letter-spacing:2px;
  color:var(--navy-deep); border:none; cursor:pointer;
  background:linear-gradient(180deg,#ff8b6b,var(--foul-red));
  padding:16px 0; width:100%; max-width:280px; border-radius:999px;
  box-shadow:0 6px 0 #a11f28;
  transition:transform .08s ease, box-shadow .08s ease;
  touch-action:manipulation; color:#fff;
}
.btn-swing:active{ transform:translateY(6px); box-shadow:0 0 0 #a11f28; }
.hint-text{ text-align:center; font-size:12px; color:var(--cream-dim); margin-top:2px; }

/* 結果彈出文字（安打／全壘打／三振...） */
.result-pop{
  position:absolute; left:50%; top:18%; transform:translate(-50%,-50%) scale(.5);
  font-family:var(--font-display); font-weight:800; font-size:22px;
  color:var(--amber); text-shadow:0 3px 0 rgba(0,0,0,.4);
  opacity:0; pointer-events:none; z-index:5; white-space:nowrap;
}
.result-pop.show{ animation:pop-in-out 1.3s ease both; }
@keyframes pop-in-out{
  0%{ opacity:0; transform:translate(-50%,-50%) scale(.4) rotate(-6deg); }
  18%{ opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(2deg); }
  30%{ transform:translate(-50%,-50%) scale(1) rotate(0); }
  80%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-60%) scale(.9); }
}

/* 螢幕震動（全壘打／miss 用） */
.shake{ animation:shake .4s ease; }
@keyframes shake{
  10%,90%{ transform:translate(-1px,0);} 20%,80%{ transform:translate(2px,-1px);}
  30%,50%,70%{ transform:translate(-3px,1px);} 40%,60%{ transform:translate(3px,-1px);}
}
.flash-red{ animation:flash-red .35s ease; }
@keyframes flash-red{ 0%{ background:rgba(230,57,70,.35);} 100%{ background:transparent;} }

/* ============================================================
   7. 局數 / 事件 橫幅
   ============================================================ */
.banner-overlay{
  position:absolute; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
  background:rgba(11,19,43,.55); backdrop-filter:blur(1px);
}
.banner-card{
  background:var(--navy-panel); border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-md); padding:18px 26px; text-align:center; max-width:88%;
  box-shadow:var(--shadow-soft);
  animation:banner-in .45s cubic-bezier(.3,1.4,.5,1) both;
}
@keyframes banner-in{ 0%{ transform:scale(.7) translateY(14px); opacity:0;} 100%{ transform:scale(1) translateY(0); opacity:1;} }
.banner-icon{ font-size:34px; margin-bottom:4px; }
.banner-title{ font-family:var(--font-display); font-weight:800; font-size:19px; color:var(--amber); }
.banner-desc{ font-size:13px; color:var(--cream-dim); margin-top:6px; line-height:1.5; }

/* ============================================================
   8. 成就 Toast
   ============================================================ */
#toast-container{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  z-index:30; display:flex; flex-direction:column; gap:6px; align-items:center;
  pointer-events:none; width:100%;
}
.toast{
  background:linear-gradient(180deg,#2a3660,#1a2544);
  border:1px solid rgba(255,182,39,.5);
  border-radius:999px; padding:8px 16px;
  display:flex; align-items:center; gap:8px;
  font-size:12.5px; font-weight:700; color:var(--cream);
  box-shadow:0 6px 16px rgba(0,0,0,.4);
  animation:toast-in-out 2.2s ease both;
}
@keyframes toast-in-out{
  0%{ opacity:0; transform:translateY(-16px) scale(.85); }
  12%{ opacity:1; transform:translateY(0) scale(1); }
  85%{ opacity:1; }
  100%{ opacity:0; transform:translateY(-10px) scale(.9); }
}
.toast-icon{ font-size:16px; }

/* ============================================================
   9. 結算畫面
   ============================================================ */
#screen-result{ text-align:center; }
.result-title{ font-size:clamp(20px,6vw,25px); color:var(--amber); margin-top:4px; }
.result-score-big{
  font-family:var(--font-mono); font-size:44px; font-weight:700; color:var(--cream);
  margin:6px 0 2px; letter-spacing:1px;
}
.result-score-label{ font-size:11px; color:var(--cream-dim); letter-spacing:2px; }

.stat-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0;
}
.stat-cell{
  background:rgba(255,255,255,.05); border-radius:var(--radius-sm); padding:10px 4px;
}
.stat-cell .num{ font-family:var(--font-mono); font-size:19px; color:var(--amber); font-weight:700; }
.stat-cell .lbl{ font-size:10.5px; color:var(--cream-dim); margin-top:2px; }

  100%{ transform:translateY(110vh) rotate(var(--rot)); opacity:0; }

  position:absolute; width:5px; height:5px; border-radius:50%;
  animation:firework-out .7s ease-out forwards;

<script>
/* ================================================================
   ⚾ 今夜決勝局：晚餐爭霸賽 － 遊戲邏輯
   全部純 HTML / CSS / JavaScript，不使用任何外部框架
   ================================================================ */
(function(){
  'use strict';

  /* ---------- 小工具 ---------- */
  const $ = (id) => document.getElementById(id);
  const sleep = (ms) => new Promise(res => setTimeout(res, ms));
  const rand = (a,b) => Math.random()*(b-a)+a;
  const randInt = (a,b) => Math.floor(rand(a,b+1));
  const clamp = (v,min,max) => Math.max(min, Math.min(max, v));

  /* ==============================================================
     一、音效模組（Web Audio API 合成音效，無需外部音檔）
     ============================================================== */
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(AC) audioCtx = new AC();
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  // 產生單一音頻（正弦/方波/三角波...）
  function tone(freq, duration, type, gainVal, delay){
    if(!audioCtx) return;
    type = type || 'sine'; gainVal = gainVal==null?0.15:gainVal; delay = delay||0;
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(gainVal, t0);
    gain.gain.exponentialRampToValueAtTime(0.0008, t0 + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.03);
  }
  // 產生白噪音爆裂音（用於揮棒風聲／打擊聲／群眾歡呼）
  function noiseBurst(duration, gainVal){
    if(!audioCtx) return;
    duration = duration||0.2; gainVal = gainVal==null?0.18:gainVal;
    const bufferSize = Math.floor(audioCtx.sampleRate*duration);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.value = gainVal;
    src.connect(gain).connect(audioCtx.destination);
    src.start();
  }
  const SFX = {
    click:        () => tone(600, 0.08, 'square', 0.07),
    windup:       () => tone(220, 0.18, 'sine', 0.09),
    swoosh:       () => noiseBurst(0.14, 0.12),
    hitSmall:     () => { tone(520,0.12,'triangle',0.16); noiseBurst(0.08,0.1); },
    hitBig:       () => { tone(700,0.15,'triangle',0.18); tone(920,0.15,'triangle',0.13,0.05); noiseBurst(0.15,0.14); },
    homerun:      () => { [660,880,1108,1320].forEach((f,i)=>tone(f,0.24,'triangle',0.16,i*0.09)); noiseBurst(0.3,0.18); },
    strike:       () => tone(150, 0.28, 'sawtooth', 0.14),
    eventJingle:  () => [523,659,784].forEach((f,i)=>tone(f,0.18,'sine',0.11,i*0.09)),
    achievement:  () => [784,988,1175].forEach((f,i)=>tone(f,0.15,'square',0.09,i*0.08)),
    crowdCheer:   () => { for(let i=0;i<6;i++) noiseBurst(0.35, 0.045); },
    reveal:       () => [440,554,659,880].forEach((f,i)=>tone(f,0.3,'triangle',0.14,i*0.12)),
    gameStart:    () => { tone(392,0.15,'square',0.11); tone(523,0.15,'square',0.11,0.15); },
    bannerChime:  () => tone(494, 0.16, 'sine', 0.1)
  };

  /* ==============================================================
     二、遊戲資料設定：事件 / 成就 / 晚餐
     ============================================================== */

  // 隨機特殊事件表：id / icon / 名稱 / 說明 / apply(cfg) 調整當局設定
  const EVENTS = [
    { id:'luckyStar',   icon:'🌟', name:'幸運星降臨', desc:'好球帶大幅擴大，這一局特別好打！',
      apply:(cfg)=>{ cfg.perfectHalf*=1.8; cfg.greatHalf*=1.6; cfg.goodHalf*=1.4; } },
    { id:'cheerSquad',  icon:'📣', name:'啦啦隊應援', desc:'全場氣勢爆棚，這局連擊加成雙倍！',
      apply:(cfg)=>{ cfg.doubleCombo = true; } },
    { id:'rainCloud',   icon:'🌧️', name:'烏雲來襲', desc:'好球帶縮小，但打中的話獎勵雙倍！',
      apply:(cfg)=>{ cfg.perfectHalf*=0.6; cfg.greatHalf*=0.6; cfg.goodHalf*=0.7; cfg.rainBonus=true; } },
    { id:'mascotDance', icon:'🐻', name:'吉祥物亂入', desc:'球速忽然變慢，時機更好抓準！',
      apply:(cfg)=>{ cfg.duration = Math.round(cfg.duration*1.3); } },
    { id:'curveball',   icon:'🌀', name:'魔球登場', desc:'球路詭異飄忽，考驗你的直覺！',
      apply:(cfg)=>{ cfg.curve = true; cfg.perfectHalf*=0.8; } },
    { id:'hotdogVendor',icon:'🌭', name:'熱狗小販路過', desc:'小販大方請客，直接送你一波分數！',
      apply:(cfg)=>{ cfg.flatBonus = (cfg.flatBonus||0) + 30; } },
    { id:'goldenGlove', icon:'🧤', name:'幸運手套', desc:'這局有保底，最差也能上壘！',
      apply:(cfg)=>{ cfg.guaranteeHit = true; } },
    { id:'stadiumLights',icon:'💡', name:'燈光秀', desc:'全場氣氛 High 翻天，分數與連擊同時加成！',
      apply:(cfg)=>{ cfg.flatBonus = (cfg.flatBonus||0) + 15; cfg.doubleCombo = true; } }
  ];

  // 成就表：id / icon / 標題 / 說明
  const ACHIEVEMENTS = {
    first_hit:      { icon:'⚾', title:'首次安打',   desc:'打出你的第一支安打' },
    first_homerun:  { icon:'💥', title:'全壘打！',   desc:'轟出第一支全壘打' },
    combo3:         { icon:'🔥', title:'3 連擊',     desc:'連續安打達到 3 次' },
    combo5:         { icon:'🌋', title:'火燙連擊',   desc:'連續安打達到 5 次' },
    iron_bat:       { icon:'🏏', title:'鋼鐵打者',   desc:'單場累積 5 支安打以上' },
    event_hunter:   { icon:'🍀', title:'幸運兒',     desc:'觸發 3 次以上特殊事件' },
    perfect_timing: { icon:'🎯', title:'完美時機',   desc:'達成極致精準的完美擊球' },
    no_miss_start:  { icon:'🚀', title:'開局不敗',   desc:'前三局完全零失誤' },
    comeback:       { icon:'💪', title:'逆轉勝',     desc:'連續兩次落空後成功逆轉安打' },
    clean_game:     { icon:'👑', title:'完全比賽',   desc:'全場九局零三振' }
  };

  // 晚餐選項：id / icon / 名稱 / slogan / 與各項數據的權重關係（權重公式對玩家保密）
  const DINNERS = [
    { id:'chicken',     icon:'🍗', name:'炸雞',   tagline:'酥脆多汁，正好慶祝這場精彩的驚喜演出！', w:{ events:3, combo:2 } },
    { id:'pizza',       icon:'🍕', name:'披薩',   tagline:'一片接一片，就像你剛才火力全開的長打！', w:{ homeruns:4, combo:1.5 } },
    { id:'burger',      icon:'🍔', name:'漢堡',   tagline:'紮實有份量，犒賞你今晚全力揮擊的手感！', w:{ homeruns:2, misses:2 } },
    { id:'ramen',       icon:'🍜', name:'拉麵',   tagline:'來碗熱湯，撫慰這場高低起伏的驚險比賽！', w:{ misses:3, hits:0.6 } },
    { id:'donburi',     icon:'🍱', name:'丼飯',   tagline:'俐落乾淨，如同你穩定精準的打擊節奏！',   w:{ hits:3, precise:2 } },
    { id:'sushi',       icon:'🍣', name:'壽司',   tagline:'職人等級的手感，配得上你完美的時機掌握！', w:{ precise:4, cleanBonus:10 } },
    { id:'curry',       icon:'🍛', name:'咖哩',   tagline:'層次豐富又下飯，正如這場高潮迭起的比賽！', w:{ homeruns:2, hits:2 } },
    { id:'guotie',      icon:'🥟', name:'鍋貼',   tagline:'一口接一口停不下來，呼應你的連擊魂！',   w:{ combo:3, events:1 } },
    { id:'saltchicken', icon:'🍢', name:'鹽酥雞', tagline:'宵夜等級的隨機驚喜，剛好呼應今晚的意外事件！', w:{ events:4 } },
    { id:'hotpot',      icon:'🥘', name:'火鍋',   tagline:'豐盛澎湃，慶祝你這場漂亮的大勝之夜！',   w:{ score:0.05, homeruns:2, combo:1 } }
  ];

  /* ==============================================================
     三、遊戲狀態
     ============================================================== */
  const state = {
    inning: 1,
    score: 0,
    combo: 0,
    unlocked: new Set(),
    stats: {
      hits:0, homeruns:0, misses:0, maxCombo:0,
      eventsTriggered:0, perfectPrecise:0
    },
    consecutiveMiss: 0,
    noMissFirst3: true,
    toastQueue: [],
    toastBusy: false,
    lastEventId: null
  };

  function resetState(){
    state.inning = 1;
    state.score = 0;
    state.combo = 0;
    state.unlocked = new Set();
    state.stats = { hits:0, homeruns:0, misses:0, maxCombo:0, eventsTriggered:0, perfectPrecise:0 };
    state.consecutiveMiss = 0;
    state.noMissFirst3 = true;
    state.lastEventId = null;
  }

  /* ==============================================================
     四、畫面切換
     ============================================================== */
  function showScreen(id){
    ['screen-title','screen-game','screen-result'].forEach(s=>{
      $(s).classList.toggle('hidden', s!==id);
    });
    $(id).classList.add('fade-in');
  }

  /* ==============================================================
     五、HUD 更新
     ============================================================== */
  function buildInningDots(){
    const wrap = $('inning-dots');
    wrap.innerHTML = '';
    for(let i=1;i<=9;i++){
      const d = document.createElement('div');
      d.className = 'inning-dot';
      d.id = 'dot-'+i;
      wrap.appendChild(d);
    }
  }
  function updateInningDots(){
    for(let i=1;i<=9;i++){
      const d = $('dot-'+i);
      d.classList.remove('done','current');
      if(i < state.inning) d.classList.add('done');
      else if(i === state.inning) d.classList.add('current');
    }
  }
  function updateHUD(){
    $('hud-inning').textContent = state.inning + ' / 9';
    $('hud-score').textContent = state.score;
    $('hud-combo').textContent = state.combo;
    updateInningDots();
  }
  function popCombo(){
    const el = $('hud-combo');
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  }

  /* ==============================================================
     六、成就 Toast 佇列
     ============================================================== */
  function queueToast(id){
    state.toastQueue.push(id);
    processToastQueue();
  }
  async function processToastQueue(){
    if(state.toastBusy) return;
    state.toastBusy = true;
    while(state.toastQueue.length){
      const id = state.toastQueue.shift();
      const meta = ACHIEVEMENTS[id];
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = '<span class="toast-icon">'+meta.icon+'</span><span>成就解鎖：'+meta.title+'</span>';
      $('toast-container').appendChild(t);
      SFX.achievement();
      await sleep(1900);
      t.remove();
    }
    state.toastBusy = false;
  }
  function tryUnlock(id, condition){
    if(condition && !state.unlocked.has(id)){
      state.unlocked.add(id);
      queueToast(id);
    }
  }
  function checkAchievements(){
    const s = state.stats;
    tryUnlock('first_hit', s.hits >= 1);
    tryUnlock('first_homerun', s.homeruns >= 1);
    tryUnlock('combo3', s.maxCombo >= 3);
    tryUnlock('combo5', s.maxCombo >= 5);
    tryUnlock('iron_bat', s.hits >= 5);
    tryUnlock('event_hunter', s.eventsTriggered >= 3);
    tryUnlock('perfect_timing', s.perfectPrecise >= 1);
    tryUnlock('no_miss_start', state.inning >= 3 && state.noMissFirst3);
    // comeback 於 resolveSwingResult 內直接觸發
  }

  /* ==============================================================
     七、每局設定（難度隨局數微幅提升）
     ============================================================== */
  function baseConfigForInning(n){
    // 球速隨局數加快（時間縮短），最低不低於 1250ms
    const duration = Math.max(1250, 1950 - (n-1)*70);
    return {
      duration,
      center: 0.84,          // 好球帶中心（軌道 0~1 的比例位置）
      perfectHalf: 0.026,    // 完美帶半寬
      greatHalf: 0.062,      // 長打帶半寬
      goodHalf: 0.115,       // 安打帶半寬
      doubleCombo:false, rainBonus:false, flatBonus:0, guaranteeHit:false, curve:false
    };
  }

  // 決定本局是否觸發特殊事件（首局不觸發、不可連續兩局觸發，機率約 40%）
  function maybeTriggerEvent(n){
    if(n === 1) return null;
    if(Math.random() > 0.4) return null;
    let pool = EVENTS.filter(e => e.id !== state.lastEventId);
    const ev = pool[randInt(0, pool.length-1)];
    state.lastEventId = ev.id;
    return ev;
  }

  /* ==============================================================
     八、球場視覺：好球帶定位 / 球體移動
     ============================================================== */
  const TRACK_START = 8;   // 軌道起點（百分比）－對應投手位置
  const TRACK_RANGE = 84;  // 軌道長度（百分比）

  function fracToPercent(frac){ return TRACK_START + frac*TRACK_RANGE; }

  function renderZones(cfg){
    setBand('zone-good',    cfg.center - cfg.goodHalf,    cfg.center + cfg.goodHalf);
    setBand('zone-great',   cfg.center - cfg.greatHalf,   cfg.center + cfg.greatHalf);
    setBand('zone-perfect', cfg.center - cfg.perfectHalf, cfg.center + cfg.perfectHalf);
  }
  function setBand(id, fromFrac, toFrac){
    const el = $(id);
    const left = fracToPercent(fromFrac);
    const width = (toFrac-fromFrac) * TRACK_RANGE;
    el.style.left = left + '%';
    el.style.width = width + '%';
  }
  function resetBall(){
    const ball = $('ball');
    ball.getAnimations().forEach(a=>a.cancel());
    ball.className = 'ball';
    ball.style.opacity = '1';
    ball.style.left = TRACK_START + '%';
    ball.style.transform = 'translate(-50%,-50%)';
  }

  /* ==============================================================
     九、單次投打時機判定（核心互動）
     ============================================================== */
  function pitchOnce(cfg){
    return new Promise((resolve)=>{
      const ball = $('ball');
      const pitcher = $('pitcher-char');
      const swingBtn = $('btn-swing');
      const fieldPanel = $('field-panel');

      if(cfg.curve) ball.classList.add('wobble'); else ball.classList.remove('wobble');

      pitcher.classList.add('winding');
      setTimeout(()=>pitcher.classList.remove('winding'), 500);

      let resolved = false;
      let rafId = null;
      const startTime = performance.now();

      function frame(now){
        const elapsed = now - startTime;
        let frac = elapsed / cfg.duration;
        if(frac > 1) frac = 1;
        ball.style.left = fracToPercent(frac) + '%';
        if(frac >= 1 && !resolved){
          finish(1); // 球完全通過還沒揮棒 -> 目送三振
          return;
        }
        if(!resolved) rafId = requestAnimationFrame(frame);
      }

      function onSwing(e){
        if(resolved) return;
        if(e) e.preventDefault();
        const elapsed = performance.now() - startTime;
        const frac = elapsed / cfg.duration;
        finish(frac);
      }
      function onKey(e){
        if(e.code === 'Space'){ e.preventDefault(); onSwing(); }
      }
      function cleanup(){
        cancelAnimationFrame(rafId);
        swingBtn.removeEventListener('pointerdown', onSwing);
        fieldPanel.removeEventListener('pointerdown', onSwing);
        window.removeEventListener('keydown', onKey);
      }
      function finish(frac){
        resolved = true;
        cleanup();
        $('batter-char').classList.add('swinging');
        setTimeout(()=>$('batter-char').classList.remove('swinging'), 300);
        SFX.swoosh();

        const diff = Math.abs(frac - cfg.center);
        let tier;
        if(frac <= 1 && diff <= cfg.perfectHalf) tier = 'perfect';
        else if(diff <= cfg.greatHalf) tier = 'great';
        else if(diff <= cfg.goodHalf) tier = 'good';
        else tier = 'miss';

        // 幸運手套事件：保底至少 good
        if(cfg.guaranteeHit && tier === 'miss') tier = 'good';

        resolve({ tier, frac, diff });
      }

      swingBtn.addEventListener('pointerdown', onSwing);
      fieldPanel.addEventListener('pointerdown', onSwing);
      window.addEventListener('keydown', onKey);
      rafId = requestAnimationFrame(frame);
    });
  }

  function spawnFireworkBurst(originLeftPct, originTopPct){

  /* --------------------------------------------------------------
     球體飛行軌跡引擎：依打擊結果等級，動態產生「每次都不一樣」的
     飛行路線，並讓落點／出牆位置清楚可見，不再是固定樣板動畫。
     - miss   ：球貼地滑落在打者腳邊，不會飛出去
     - good   ：短弧線，落在內野附近，看得到落地塵土
     - great  ：中高弧線，飛向外野深處，落地位置隨機、有滾動感
     - perfect：長弧線直接飛越全壘打牆，拖著金色尾跡消失在畫面外
     -------------------------------------------------------------- */
  function flyBallTrajectory(tier){
    const ball = $('ball');
    const panel = $('field-panel');
    const rect = panel.getBoundingClientRect();
    const w = rect.width, h = rect.height;

    // 球目前的位置（揮棒當下的座標），做為飛行的起點
    const startLeftPct = parseFloat(ball.style.left) || TRACK_START;
    const startLeftPx = (startLeftPct/100) * w;
    const startTopPx = h/2;

    // 每次都重新擲骰決定左外野／右外野方向，讓軌跡不重複
    const dir = Math.random() < 0.5 ? -1 : 1;
    ball.classList.remove('trail');

    let dx, peakY, endY, endScale, duration, keyframesArr, isExit=false;

    if(tier === 'miss'){
      duration = 340;
      dx = dir * rand(4,14);
      peakY = rand(2,8);
      endY = rand(h*0.14, h*0.22);
      endScale = 0.55;
      keyframesArr = [
        { transform:'translate(-50%,-50%) translate(0px,0px) scale(1)', offset:0 },
        { transform:`translate(-50%,-50%) translate(${dx}px, ${endY}px) scale(${endScale})`, offset:1, opacity:0.2 }
      ];
    } else if(tier === 'good'){
      duration = 620;
      dx = dir * rand(w*0.05, w*0.11);
      peakY = -rand(h*0.16, h*0.28);
      endY = rand(h*0.04, h*0.11);
      endScale = 0.8;
      keyframesArr = [
        { transform:'translate(-50%,-50%) translate(0px,0px) scale(1)', offset:0 },
        { transform:`translate(-50%,-50%) translate(${dx*0.55}px, ${peakY}px) scale(1.05)`, offset:0.5 },
        { transform:`translate(-50%,-50%) translate(${dx}px, ${endY}px) scale(${endScale})`, offset:1 }
      ];
    } else if(tier === 'great'){
      duration = 820;
      dx = dir * rand(w*0.16, w*0.28);
      peakY = -rand(h*0.42, h*0.58);
      endY = -rand(h*0.02, h*0.1);
      endScale = 0.65;
      keyframesArr = [
        { transform:'translate(-50%,-50%) translate(0px,0px) scale(1)', offset:0 },
        { transform:`translate(-50%,-50%) translate(${dx*0.55}px, ${peakY}px) scale(1.15)`, offset:0.55 },
        { transform:`translate(-50%,-50%) translate(${dx}px, ${endY}px) scale(${endScale})`, offset:1 }
      ];
    } else { // perfect：飛越全壘打牆
      isExit = true;
      duration = 950;
      dx = dir * rand(w*0.2, w*0.38);
      peakY = -rand(h*0.7, h*0.9);
      endY = -h*1.25;
      endScale = 0.25;
      ball.classList.add('trail');
      keyframesArr = [
        { transform:'translate(-50%,-50%) translate(0px,0px) scale(1)', offset:0 },
        { transform:`translate(-50%,-50%) translate(${dx*0.45}px, ${peakY*0.55}px) scale(1.25)`, offset:0.4 },
        { transform:`translate(-50%,-50%) translate(${dx}px, ${endY}px) scale(${endScale})`, offset:1, opacity:0 }
      ];
      // 沿路灑落幾顆金色尾跡粒子，強化「飛得又高又遠」的感受
      [0.25,0.45,0.65,0.85].forEach(t=>{
        setTimeout(()=>{
          const px = startLeftPx + dx*t;
          const py = startTopPx + (peakY*0.55 + (endY-peakY*0.55)*t);
          spawnSparkle(px, py);
        }, duration*t);
      });
    }

    const anim = ball.animate(keyframesArr, { duration, easing:'ease-out', fill:'forwards' });

    return new Promise(resolve=>{
      anim.onfinish = ()=>{
        if(!isExit){
          spawnDust(startLeftPx+dx, startTopPx+endY);
        }
        resolve();
      };
    });
  }

  // 每種結果準備多組文字，隨機挑選，避免每次都看到一樣的字樣
  const RESULT_TEXTS = {
    perfect: ['🎆 全壘打！', '💥 場外全壘打！', '🚀 轟出全壘打牆！', '🔥 大三元一擊！'],
    great:   ['✨ 長打安打！', '🌊 二壘安打！', '⚡ 三壘打！', '🎯 漂亮的長打！'],
    good:    ['🙂 一壘安打！', '👍 內野安打上壘！', '😄 穩穩打上壘包！', '⚾ 安打！'],
    missSwing: ['💨 揮棒落空！', '😅 撲了個空！', '🌀 完全沒碰到！'],
    missLook:  ['👀 目送好球…三振！', '😯 呆站被三振！', '📛 好球通過，三振出局！']
  };
  function pickText(arr){ return arr[randInt(0, arr.length-1)]; }

  async function resolveSwingResult(result, event){
    const multiplierBase = 1 + Math.min(state.combo,10)*0.1;
    const multiplier = (event && event.id==='cheerSquad') || (event && event.id==='stadiumLights') ? multiplierBase*2 : multiplierBase;
    const rainMul = (event && event.rainBonus) ? 2 : 1;

    if(result.tier === 'perfect'){
      state.stats.homeruns++;
      state.stats.hits++;
      if(result.diff <= 0.01) state.stats.perfectPrecise++;
      state.combo++;
      state.consecutiveMiss = 0;
      state.stats.maxCombo = Math.max(state.stats.maxCombo, state.combo);
      const gained = Math.round(100 * multiplier * rainMul);
      state.score += gained;
      SFX.homerun();
      showResultPop(pickText(RESULT_TEXTS.perfect)+' +'+gained, '#FFB627');
      const flightDone = flyBallTrajectory('perfect');
      await sleep(150);
      screenShake();
      spawnFireworkBurst(80, 8);
      await flightDone;
      SFX.crowdCheer();
      await sleep(250);
    } else if(result.tier === 'great'){
      state.stats.hits++;
      state.combo++;
      state.consecutiveMiss = 0;
      state.stats.maxCombo = Math.max(state.stats.maxCombo, state.combo);
      const gained = Math.round(50 * multiplier * rainMul);
      state.score += gained;
      SFX.hitBig();
      showResultPop(pickText(RESULT_TEXTS.great)+' +'+gained, '#FFD166');
      await flyBallTrajectory('great');
      await sleep(180);
    } else if(result.tier === 'good'){
      state.stats.hits++;
      state.combo++;
      state.consecutiveMiss = 0;
      state.stats.maxCombo = Math.max(state.stats.maxCombo, state.combo);
      const gained = Math.round(20 * multiplier * rainMul);
      state.score += gained;
      SFX.hitSmall();
      showResultPop(pickText(RESULT_TEXTS.good)+' +'+gained, '#F4F1DE');
      await flyBallTrajectory('good');
      await sleep(150);
    } else { // miss
      state.stats.misses++;
      if(state.inning <= 3) state.noMissFirst3 = false;
      state.consecutiveMiss++;
      state.combo = 0;
      SFX.strike();
      flashRed();
      const text = result.frac >= 1 ? pickText(RESULT_TEXTS.missLook) : pickText(RESULT_TEXTS.missSwing);
      showResultPop(text, '#E63946');
      await flyBallTrajectory('miss');
      await sleep(200);
    }

    // 逆轉勝成就：連續兩次落空後成功打出安打
    if(result.tier !== 'miss' && state._prevConsecutiveMiss >= 2){
      tryUnlock('comeback', true);
    }
    state._prevConsecutiveMiss = state.consecutiveMiss;

    // 免費加碼分數（熱狗小販／燈光秀事件）
    if(event && event.flatBonus){
      state.score += event.flatBonus;
    }

    popCombo();
    updateHUD();
    checkAchievements();
  }

  /* ==============================================================
     十二、單局流程
     ============================================================== */
  async function runInning(n){
    state.inning = n;
    updateHUD();

    await showBanner('⚾', '第 ' + n + ' 局 上場打擊', getInningFlavor(n), 1000);

    const cfg = baseConfigForInning(n);
    const event = maybeTriggerEvent(n);
    if(event){
      event.apply(cfg);
      state.stats.eventsTriggered++;
      SFX.eventJingle();
      await showBanner(event.icon, event.name, event.desc, 1500);
    }

    renderZones(cfg);
    resetBall();
    SFX.windup();
    await sleep(400);

    const result = await pitchOnce(cfg);
    result._cfg = cfg;
    await resolveSwingResult(result, event);
    await sleep(350);

    // 第七局伸展操：純儀式感小彩蛋，附加少量獎勵分數
    if(n === 6){
      await seventhInningStretch();
    }
  }

  function getInningFlavor(n){
    // 依比賽階段分成三個詞庫，每次從對應階段隨機挑一句，重玩時旁白不會一成不變
    const early = ['深呼吸，感受球場的氣氛。','對手投手開始暖身，注意球路！','今晚的手感如何，讓我們看看。','觀眾陸續入場，比賽正式展開！'];
    const mid   = ['觀眾席逐漸沸騰起來！','中場氣氛正熱，穩住手感。','場邊小販的吆喝聲此起彼落。','風向似乎變了，留意球路！'];
    const late  = ['越來越緊張，別眨眼！','進入比賽下半場，全力以赴！','倒數計時，關鍵時刻來了！','全場屏息以待這一擊！'];
    const final = ['最終局，決定今晚命運的一擊！','就是現在，把晚餐打回家！','壓軸登場，全力一揮！'];
    if(n === 9) return pickText(final);
    if(n >= 7) return pickText(late);
    if(n >= 4) return pickText(mid);
    return pickText(early);
  }

  async function seventhInningStretch(){
    const overlay = $('banner-overlay');
    $('banner-icon').textContent = '🎶';
    $('banner-title').textContent = '七局伸展操時間！';
    $('banner-desc').textContent = '全場一起唱歌伸展，主辦單位大方加碼 +15 分！';
    overlay.classList.remove('hidden');

  /* ==============================================================
     十三、決定晚餐（隱藏演算法：依表現數據加權 + 隨機性）
     ============================================================== */
  function decideDinner(){
    const s = state.stats;
    const components = {
      events: s.eventsTriggered,
      combo: s.maxCombo,
      homeruns: s.homeruns,
      misses: s.misses,
      hits: s.hits,
      precise: s.perfectPrecise,
      cleanBonus: s.misses === 0 ? 1 : 0,
      score: state.score
    };
    let best = null, bestW = -Infinity;
    DINNERS.forEach(d=>{
      let w = 0;
      for(const k in d.w){ w += (components[k]||0) * d.w[k]; }
      w += Math.random() * 12; // 隨機擾動，確保每次遊玩結果都可能不同
      if(w > bestW){ bestW = w; best = d; }
    });
    return best;
  }

  /* ==============================================================
     十四、結算畫面
     ============================================================== */
  async function showResults(){
    showScreen('screen-result');

    // 分數數字滾動動畫
    const scoreEl = $('result-score');
    const target = state.score;
    const dur = 900;
    const t0 = performance.now();
    function step(now){
      const p = clamp((now-t0)/dur, 0, 1);
      scoreEl.textContent = Math.round(target * (1-Math.pow(1-p,3)));
      if(p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);

    // 數據統計格
    const s = state.stats;
    const statList = [
      { num:s.hits, lbl:'安打數' },
      { num:s.homeruns, lbl:'全壘打' },
      { num:s.maxCombo, lbl:'最高連擊' },
      { num:s.misses, lbl:'三振' },
      { num:s.eventsTriggered, lbl:'特殊事件' },
      { num:s.perfectPrecise, lbl:'完美擊球' }
    ];
    $('stat-grid').innerHTML = statList.map(x=>
      '<div class="stat-cell"><div class="num">'+x.num+'</div><div class="lbl">'+x.lbl+'</div></div>'
    ).join('');

    // 完全比賽成就（需在賽後才能判定）
    tryUnlock('clean_game', s.misses === 0);

    // 成就徽章列表
    const achChips = Array.from(state.unlocked).map(id=>{
      const m = ACHIEVEMENTS[id];
      return '<div class="ach-chip">'+m.icon+' '+m.title+'</div>';
    }).join('');
    $('ach-row').innerHTML = achChips || '<div class="ach-chip" style="opacity:.6;">尚無特別成就</div>';

    await sleep(1400);

    // 分析中...動畫停留
    await sleep(1800);
    $('analyzing-block').classList.add('hidden');

    // 揭曉晚餐
    const dinner = decideDinner();
    $('dinner-icon').textContent = dinner.icon;
    $('dinner-name').textContent = dinner.name;
    $('dinner-tagline').textContent = dinner.tagline;
    $('dinner-card').classList.remove('hidden');
    SFX.reveal();
    $('dinner-flip-inner').classList.add('reveal');
    spawnConfetti(90);

    await sleep(600);
    $('result-actions').classList.remove('hidden');
  }
